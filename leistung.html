<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leistung · JKK Jerome</title>
<meta name="description" content="Neun Module für die Digitalisierung der Bootsbranche: Fotografie, Film, KI Visuals, Social Media, Paid Ads, SEO, Websites, Verkaufssysteme und Marketingberatung." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#000;--fg:#fff;--fg-2:#b8b8b8;--fg-3:#6a6a6a;--line:#1c1c1c;--line-bright:#3a3a3a;
    --gold:oklch(0.86 0.006 250);--gold-2:oklch(0.74 0.006 250);--gold-3:oklch(0.60 0.005 250);--gold-dim:oklch(0.46 0.004 250);
    --silver-sheen:linear-gradient(115deg,#6f7681 0%,#d7dde4 22%,#ffffff 38%,#a8afb9 52%,#eef1f5 66%,#878e98 82%,#cdd3da 100%);
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    --sans:"IBM Plex Sans",system-ui,-apple-system,sans-serif;
    --display:"Archivo",system-ui,sans-serif;
    --serif:var(--sans); /* serif retired */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--fg);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;}
  [data-de]{display:none}
  html[lang="de"] [data-de]{display:revert}
  html[lang="de"] [data-en]{display:none}

  .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background-image:linear-gradient(to right,var(--line) 1px,transparent 1px),linear-gradient(to bottom,var(--line) 1px,transparent 1px);
    background-size:72px 72px;
    -webkit-mask-image:radial-gradient(130% 100% at 50% 0%,#000 30%,transparent 85%);
    mask-image:radial-gradient(130% 100% at 50% 0%,#000 30%,transparent 85%);}

  .wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 32px;}

  /* top bar */
  .bar{display:flex;align-items:center;justify-content:space-between;padding:28px 0;border-bottom:1px solid var(--line);
    font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--fg-3);}
  .bar a{color:var(--fg-2);text-decoration:none;display:inline-flex;align-items:center;gap:9px;transition:color .25s}
  .bar a:hover{color:#fff}
  .bar .home .mk{color:#fff;font-family:var(--display);font-weight:900;letter-spacing:.04em}

  /* hero */
  .head{padding:84px 0 0;}
  .kicker{font-family:var(--mono);font-size:11.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);margin-bottom:26px;display:flex;gap:16px;flex-wrap:wrap}
  .kicker .sep{color:var(--fg-3)}
  h1{font-family:var(--display);font-weight:900;text-transform:uppercase;letter-spacing:-.02em;line-height:.98;
    font-size:clamp(44px,7vw,104px);margin-bottom:30px;}
  .lead{font-family:var(--serif);font-weight:500;font-size:clamp(21px,2.5vw,30px);line-height:1.34;color:#e9e9e9;max-width:30ch;}

  /* body grid */
  .content{display:grid;grid-template-columns:1fr 1fr;gap:64px;padding:72px 0 0;align-items:start;}
  @media(max-width:760px){.content{grid-template-columns:1fr;gap:46px}}
  .col-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--fg-3);
    padding-bottom:16px;margin-bottom:26px;border-bottom:1px solid var(--line);}
  .intro p{font-size:15.5px;line-height:1.78;color:#a7a7a7;margin-bottom:18px;max-width:46ch;}

  .includes{list-style:none;display:flex;flex-direction:column;}
  .includes li{display:flex;gap:18px;align-items:baseline;padding:16px 0;border-bottom:1px solid var(--line);}
  .includes li .n{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.1em;flex:none;width:26px;}
  .includes li .t{font-family:var(--display);font-weight:500;font-size:17px;letter-spacing:-.005em;color:#ededed;}

  /* meta row */
  .specs{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);margin:80px 0 0;border:1px solid var(--line)}
  .specs .s{background:#050505;padding:22px 24px;display:flex;flex-direction:column;gap:9px}
  .specs .s .k{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg-3)}
  .specs .s .v{font-family:var(--display);font-weight:700;font-size:19px;color:#fff;letter-spacing:-.01em}
  @media(max-width:760px){.specs{grid-template-columns:1fr}}

  /* cta */
  .cta-row{display:flex;flex-wrap:wrap;gap:16px;align-items:center;padding:80px 0 120px;}
  .btn{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;
    display:inline-flex;align-items:center;gap:12px;padding:18px 30px;transition:all .3s}
  .btn.primary{background:var(--gold);color:#0a0a0a;font-weight:500}
  .btn.primary:hover{background:var(--gold-2);transform:translateY(-2px)}
  .btn.ghost{border:1px solid var(--line-bright);color:var(--fg-2)}
  .btn.ghost:hover{border-color:#fff;color:#fff}
  .btn .arr{font-family:var(--display);font-weight:900;font-size:15px}

  /* animated traveling-light border on CTA buttons */
  @property --btn-a{ syntax:'<angle>'; inherits:false; initial-value:0deg; }
  .btn{position:relative;isolation:isolate;}
  .btn::after{
    content:"";position:absolute;inset:0;padding:1.6px;border-radius:inherit;pointer-events:none;
    background:conic-gradient(from var(--btn-a),
      transparent 0turn,transparent 0.60turn,
      rgba(255,255,255,0) 0.66turn,#ffffff 0.80turn,var(--gold) 0.92turn,transparent 1turn);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask-composite:exclude;
    animation:btnBorder 4.5s linear infinite;
  }
  .btn.primary::after{
    background:conic-gradient(from var(--btn-a),
      transparent 0turn,transparent 0.60turn,
      rgba(255,255,255,0) 0.66turn,#ffffff 0.82turn,rgba(255,255,255,.65) 0.92turn,transparent 1turn);
  }
  @keyframes btnBorder{ to{ --btn-a:1turn; } }
  @media(prefers-reduced-motion:reduce){ .btn::after{animation:none;opacity:.0} }

  .nf{padding:120px 0;text-align:center;font-family:var(--mono);color:var(--fg-3);letter-spacing:.2em;text-transform:uppercase}
  .nf a{color:var(--gold);text-decoration:none}

  /* ── enhanced detail sections ── */
  .detail-section{padding:80px 0 0;}
  .detail-section .section-head{display:flex;align-items:baseline;gap:18px;padding-bottom:16px;
    margin-bottom:36px;border-bottom:1px solid var(--line);}
  .detail-section .section-head .sh-k{font-family:var(--mono);font-size:10.5px;letter-spacing:.24em;
    text-transform:uppercase;color:var(--fg-3);}
  .detail-section .section-head h2{font-family:var(--display);font-weight:900;text-transform:uppercase;
    letter-spacing:-.015em;line-height:1;font-size:clamp(24px,3vw,38px);color:#fff;}

  /* process steps */
  .process-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;
    background:var(--line);border:1px solid var(--line);}
  .process-step{background:#050505;padding:32px 28px;display:flex;flex-direction:column;gap:14px;
    transition:background .3s;}
  .process-step:hover{background:#0a0a0a;}
  .process-step .ps-num{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--gold);}
  .process-step .ps-title{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.01em;color:#fff;}
  .process-step .ps-desc{font-size:14.5px;line-height:1.68;color:#9a9a9a;}

  /* target audience */
  .audience-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;}
  @media(max-width:760px){.audience-grid{grid-template-columns:1fr;gap:32px}}
  .audience-list{list-style:none;}
  .audience-list li{display:flex;gap:16px;align-items:flex-start;padding:18px 0;border-bottom:1px solid var(--line);}
  .audience-list li .al-icon{flex:none;width:36px;height:36px;border:1px solid var(--line-bright);border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--gold);}
  .audience-list li .al-icon svg{width:16px;height:16px;}
  .audience-list li .al-text .al-t{font-family:var(--display);font-weight:600;font-size:16px;color:#ededed;margin-bottom:4px;}
  .audience-list li .al-text .al-d{font-size:14px;line-height:1.62;color:#9a9a9a;}
  .audience-desc{font-size:15.5px;line-height:1.78;color:#a7a7a7;}
  .audience-desc p{margin-bottom:18px;}

  /* result highlight */
  .result-box{border:1px solid var(--line);background:#050505;padding:48px 40px;display:flex;gap:40px;
    align-items:flex-start;}
  @media(max-width:760px){.result-box{flex-direction:column;padding:32px 24px;gap:28px;}}
  .result-box .rb-icon{flex:none;width:56px;height:56px;border:1px solid var(--gold-dim);border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--gold);}
  .result-box .rb-icon svg{width:24px;height:24px;}
  .result-box .rb-content .rb-title{font-family:var(--display);font-weight:900;font-size:22px;
    text-transform:uppercase;letter-spacing:-.01em;color:#fff;margin-bottom:14px;}
  .result-box .rb-content .rb-text{font-size:15.5px;line-height:1.72;color:#a7a7a7;max-width:60ch;}

  /* detail text full-width */
  .detail-text{font-size:15.5px;line-height:1.78;color:#a7a7a7;max-width:68ch;}
  .detail-text p{margin-bottom:18px;}

  /* ── scroll-morph showcase (full-bleed, page-scroll driven) ── */
  .morph-section{position:relative;left:50%;margin-left:-50vw;width:100vw;height:280vh;background:#000;
    margin-top:96px;border-top:1px solid var(--line);}
  /* as hero: flush to the top, no divider, slightly shorter scroll */
  .morph-hero{margin-top:28px;border-top:0;height:260vh;}
  .morph-sticky{position:sticky;top:0;height:100vh;width:100%;overflow:hidden;
    background:radial-gradient(120% 120% at 50% 0%, #0a0a0a 0%, #000 65%);}
  .morph-stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    cursor:crosshair;}
  .morph-cards{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;}

  .mc-card{position:absolute;left:50%;top:50%;width:64px;height:90px;margin-left:-32px;margin-top:-45px;
    perspective:1000px;will-change:transform,opacity;cursor:pointer;}
  .mc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;
    transition:transform .6s cubic-bezier(.4,.2,.2,1);}
  .mc-card:hover .mc-inner{transform:rotateY(180deg);}
  .mc-face{position:absolute;inset:0;border-radius:8px;overflow:hidden;
    -webkit-backface-visibility:hidden;backface-visibility:hidden;
    box-shadow:0 14px 32px -12px rgba(0,0,0,.75);}
  .mc-front img{width:100%;height:100%;object-fit:cover;display:block;}
  .mc-front .ov{position:absolute;inset:0;border-radius:8px;background:rgba(0,0,0,.12);
    border:1px solid rgba(255,255,255,.14);transition:background .3s;}
  .mc-card:hover .mc-front .ov{background:transparent}
  .mc-back{transform:rotateY(180deg);background:#0a0a0a;border:1px solid var(--line-bright);border-radius:8px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
  .mc-back .k{font-family:var(--mono);font-size:7px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);}
  .mc-back .v{font-family:var(--display);font-weight:500;font-size:11px;color:#fff;}

  .morph-intro{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;
    pointer-events:none;z-index:4;width:min(92%,900px);}
  .morph-intro .mi-kicker{font-family:var(--mono);font-size:11.5px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--gold);margin-bottom:24px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .morph-intro .mi-kicker .sep{color:var(--fg-3)}
  .morph-intro .mi-h{font-family:var(--display);font-weight:900;text-transform:uppercase;letter-spacing:-.02em;
    line-height:.96;font-size:clamp(46px,8vw,118px);color:#fff;margin:0;}
  .morph-intro .mi-sub{font-family:var(--mono);font-size:11px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--fg-2);margin-top:26px;}
  .morph-arc-content{position:absolute;top:13%;left:50%;transform:translateX(-50%);text-align:center;
    pointer-events:none;z-index:4;opacity:0;max-width:680px;padding:0 24px;}
  .morph-arc-content .ma-k{font-family:var(--mono);font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--gold);display:block;margin-bottom:18px;}
  .morph-arc-content .ma-lead{font-family:var(--serif);font-weight:500;font-size:clamp(22px,3vw,40px);
    line-height:1.24;color:#fff;}
  /* scroll cue under the hero */
  .morph-scrollcue{position:absolute;left:50%;bottom:38px;transform:translateX(-50%);z-index:4;
    width:1px;height:54px;background:linear-gradient(to bottom, transparent, var(--line-bright));overflow:hidden;pointer-events:none;}
  .morph-scrollcue span{position:absolute;top:-30%;left:0;width:1px;height:40%;background:var(--gold);
    animation:cueRun 1.9s cubic-bezier(.7,0,.3,1) infinite;}
  @keyframes cueRun{0%{top:-40%}60%,100%{top:120%}}
  @media(prefers-reduced-motion:reduce){.morph-scrollcue span{animation:none}}
  @media(max-width:760px){.morph-section{height:240vh}.morph-hero{height:230vh}}

  /* ── before / after image-comparison sliders ── */
  .cmp-section{padding:104px 0 0;}
  .cmp-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;
    padding-bottom:18px;border-bottom:1px solid var(--line);}
  .cmp-head .ch-k{font-family:var(--mono);font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--fg-3);}
  .cmp-head h2{font-family:var(--display);font-weight:900;text-transform:uppercase;letter-spacing:-.015em;
    line-height:1;font-size:clamp(28px,3.6vw,46px);color:#fff;}
  .cmp-head .ch-hint{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
  .cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:30px;}
  .cmp-grid .span{grid-column:1 / -1;}
  @media(max-width:760px){.cmp-grid{grid-template-columns:1fr}}

  .cmp{position:relative;overflow:hidden;border:1px solid var(--line);background:#040404;user-select:none;
    aspect-ratio:16/10;cursor:ew-resize;touch-action:none;}
  .cmp.span{aspect-ratio:21/8;}
  .cmp-layer{position:absolute;inset:0;overflow:hidden;}
  .cmp-before{z-index:2;will-change:clip-path;}
  /* striped placeholders */
  .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;}
  .ph-a{background:
      repeating-linear-gradient(135deg, #0d0d0d 0 11px, #0a0a0a 11px 22px);}
  .ph-b{background:
      repeating-linear-gradient(135deg, oklch(0.27 0.008 250) 0 11px, oklch(0.23 0.006 250) 11px 22px);}
  .ph .ph-k{font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--fg-3);}
  .ph-b .ph-k{color:var(--gold);}
  .ph .ph-t{font-family:var(--display);font-weight:700;font-size:clamp(15px,1.7vw,21px);letter-spacing:-.01em;
    text-transform:uppercase;color:#cfcfcf;text-align:center;padding:0 18px;}
  .ph-b .ph-t{color:#fff;}
  .ph .ph-d{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);}

  /* corner tags */
  .cmp-tag{position:absolute;top:14px;z-index:4;font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;
    text-transform:uppercase;color:#fff;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
    padding:6px 11px;border:1px solid rgba(255,255,255,.14);pointer-events:none;}
  .cmp-tag.before{left:14px;}
  .cmp-tag.after{right:14px;color:var(--gold);border-color:var(--gold-dim);}

  /* divider + handle */
  .cmp-divider{position:absolute;top:0;bottom:0;width:2px;margin-left:-1px;z-index:3;
    background:rgba(255,255,255,.85);box-shadow:0 0 0 1px rgba(0,0,0,.35);pointer-events:none;}
  .cmp-handle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;
    display:flex;align-items:center;justify-content:center;border-radius:50%;
    background:rgba(10,10,10,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.35);
    color:var(--gold);box-shadow:0 10px 28px -8px rgba(0,0,0,.8);transition:transform .25s ease;}
  .cmp:hover .cmp-handle{transform:translate(-50%,-50%) scale(1.06);}
  .cmp.dragging .cmp-handle{transform:translate(-50%,-50%) scale(1.06);box-shadow:0 0 0 4px oklch(0.86 0.006 250 / .2),0 10px 28px -8px rgba(0,0,0,.8);}
  .cmp-handle svg{width:13px;height:13px;display:block;}
  .cmp-handle .cv-l{margin-right:-3px;}
  .cmp-handle .cv-r{margin-left:-3px;}
  .cmp-cap{margin-top:13px;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-2);}
  .cmp-cap .num{color:var(--gold);margin-right:10px;}

  /* ── AI image-carousel hero (orbiting cards) ── */
  .aih{position:relative;left:50%;margin-left:-50vw;width:100vw;overflow:hidden;
    background:radial-gradient(120% 120% at 50% 0%, #0b0b0b 0%, #000 62%);
    border-bottom:1px solid var(--line);padding:60px 0 96px;}
  .aih-glow{position:absolute;inset:0;pointer-events:none;z-index:0;}
  .aih-glow b{position:absolute;width:520px;height:520px;border-radius:50%;filter:blur(90px);opacity:.5;
    background:radial-gradient(circle at center, oklch(0.62 0.01 250 / .22), transparent 70%);}
  .aih-glow b.g1{top:-160px;right:-80px;}
  .aih-glow b.g2{bottom:-200px;left:-120px;}
  .aih-inner{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 32px;
    display:flex;flex-direction:column;align-items:center;}
  .aih-stage{position:relative;width:100%;max-width:880px;height:clamp(340px,50vw,500px);
    margin-bottom:14px;perspective:1300px;}
  .aih-orbit{position:absolute;inset:0;transform-style:preserve-3d;
    transition:transform .4s cubic-bezier(.3,.6,.3,1);}
  .aih-card{position:absolute;left:50%;top:50%;width:clamp(98px,11.5vw,148px);aspect-ratio:4/5;
    will-change:transform;border-radius:14px;overflow:hidden;
    box-shadow:0 22px 48px -18px rgba(0,0,0,.85);}
  .aih-card .ph{border-radius:14px;}
  .aih-card .ph-k{font-size:8.5px;letter-spacing:.2em;}
  .aih-card .ph-n{font-family:var(--display);font-weight:900;font-size:clamp(18px,2vw,26px);color:#e8e8e8;letter-spacing:-.02em;}
  .aih-card .ph-b .ph-n{color:#fff;}
  .aih-card::after{content:"";position:absolute;inset:0;border:1px solid rgba(255,255,255,.12);border-radius:14px;
    background:linear-gradient(150deg, rgba(255,255,255,.14), transparent 42%);pointer-events:none;}

  .aih-content{position:relative;z-index:2;text-align:center;max-width:30ch;margin:0 auto;}
  .aih-content .aih-k{font-family:var(--mono);font-size:11px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--gold);margin-bottom:22px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .aih-content .aih-k .sep{color:var(--fg-3)}
  .aih-content h1{font-family:var(--display);font-weight:900;text-transform:uppercase;letter-spacing:-.02em;
    line-height:.96;font-size:clamp(40px,6.4vw,92px);margin-bottom:24px;color:#fff;}
  .aih-content .aih-lead{font-family:var(--serif);font-weight:500;font-size:clamp(20px,2.4vw,29px);
    line-height:1.32;color:#e9e9e9;margin:0 auto 34px;max-width:24ch;}
  .aih-cta{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;
    display:inline-flex;align-items:center;gap:12px;padding:18px 32px;background:var(--gold);color:#0a0a0a;
    font-weight:500;transition:all .3s;}
  .aih-cta:hover{background:var(--gold-2);transform:translateY(-2px)}
  .aih-cta .arr{font-family:var(--display);font-weight:900;font-size:15px;transition:transform .3s}
  .aih-cta:hover .arr{transform:translateX(4px)}

  .aih-feats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);

  function mountRotTimeline(lang){
    var stage=document.getElementById('rot-stage'), orbit=document.getElementById('rot-orbit'), ring=document.getElementById('rot-ring');
    if(!stage||!orbit) return;
    var nodes=Array.prototype.slice.call(orbit.querySelectorAll('.rot-node'));
    var total=nodes.length, rotation=0, autoRotate=true, activeId=null, radius=200, timer=null;
    function calcRadius(){ radius=Math.max(150,Math.min(280, Math.min(stage.clientWidth, stage.clientHeight)*0.32)); ring.style.width=ring.style.height=(radius*2)+'px'; }
    function positionAll(){
      nodes.forEach(function(node,i){
        var ang=((i/total)*360 + rotation) % 360;
        var rad=ang*Math.PI/180;
        var x=radius*Math.cos(rad), y=radius*Math.sin(rad);
        var z=Math.round(100+50*Math.cos(rad));
        var op=Math.max(0.42, Math.min(1, 0.42+0.58*((1+Math.sin(rad))/2)));
        node.style.transform='translate('+x.toFixed(1)+'px,'+y.toFixed(1)+'px)';
        if(node.classList.contains('active')){ node.style.zIndex=400; node.style.opacity=1; }
        else { node.style.zIndex=String(z); node.style.opacity=op.toFixed(3); }
      });
    }
    function startAuto(){ if(timer) return; timer=setInterval(function(){ if(autoRotate){ rotation=(rotation+0.3)%360; positionAll(); } },50); }
    function snapTo(idx){
      var target=(idx/total)*360;
      rotation=(270-target)%360;
      nodes.forEach(function(n){ n.style.transition='transform .7s cubic-bezier(.22,1,.36,1)'; });
      positionAll();
      setTimeout(function(){ nodes.forEach(function(n){ n.style.transition=''; }); },720);
    }
    function clearActive(){
      activeId=null; autoRotate=true;
      nodes.forEach(function(n){ n.classList.remove('active','related'); });
    }
    function activate(id){
      var idx=nodes.findIndex(function(n){ return +n.dataset.id===id; });
      if(idx<0) return;
      var node=nodes[idx];
      if(activeId===id){ clearActive(); positionAll(); return; }
      autoRotate=false; activeId=id;
      var rel=(node.dataset.related||'').split(',').filter(Boolean).map(Number);
      nodes.forEach(function(n){
        n.classList.remove('active','related');
        var nid=+n.dataset.id;
        if(nid===id) n.classList.add('active');
        else if(rel.indexOf(nid)>=0) n.classList.add('related');
      });
      snapTo(idx);
    }
    nodes.forEach(function(node){
      node.querySelector('.nd-dot').addEventListener('click', function(e){ e.stopPropagation(); activate(+node.dataset.id); });
      node.querySelector('.nd-label').addEventListener('click', function(e){ e.stopPropagation(); activate(+node.dataset.id); });
      var card=node.querySelector('.rot-card');
      card.addEventListener('click', function(e){ e.stopPropagation(); });
      card.querySelectorAll('button[data-goto]').forEach(function(b){
        b.addEventListener('click', function(e){ e.stopPropagation(); activate(+b.dataset.goto); });
      });
    });
    stage.addEventListener('click', function(e){ if(e.target===stage||e.target===orbit){ clearActive(); positionAll(); } });
    window.addEventListener('resize', function(){ calcRadius(); positionAll(); }, {passive:true});
    calcRadius(); positionAll();
    var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ startAuto(); } else { autoRotate=autoRotate&&false; } }); },{threshold:0.12});
    io.observe(stage);
    if(matchMedia('(prefers-reduced-motion: reduce)').matches){ autoRotate=false; }
    else { startAuto(); }
  }

  function dashboardCardHtml(lang){
    var SERIES = [
      { name:(lang==='de'?'Inserate':'Inserate'), color:'#e9edf1', data:[22,26,24,30,28,34,38] },
      { name:'Charter', color:'#9aa3ad', data:[14,16,15,19,18,22,25] },
      { name:(lang==='de'?'Direkt':'Direct'), color:'#5f6670', data:[8,9,11,10,13,12,15] }
    ];
    var N = SERIES[0].data.length;
    var W=460, H=188, padL=8, padR=8, padT=14, padB=24;
    var plotW = W-padL-padR, plotH = H-padT-padB, baseY = padT+plotH, yMax=92;
    function X(i){ return padL + i*(plotW/(N-1)); }
    function Y(v){ return padT + plotH*(1 - v/yMax); }
    // cumulative levels (stacked)
    var levels=[]; var run=new Array(N).fill(0);
    levels.push(run.slice());
    SERIES.forEach(function(s){ run = run.map(function(v,i){ return v + s.data[i]; }); levels.push(run.slice()); });
    function pts(level){ return level.map(function(v,i){ return [X(i), Y(v)]; }); }
    function seg(P){ // catmull-rom → bezier, no leading move
      var d='';
      for(var i=0;i<P.length-1;i++){
        var p0=P[i-1]||P[i], p1=P[i], p2=P[i+1], p3=P[i+2]||P[i+1];
        var c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
        var c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
        d+='C'+c1x.toFixed(1)+','+c1y.toFixed(1)+' '+c2x.toFixed(1)+','+c2y.toFixed(1)+' '+p2[0].toFixed(1)+','+p2[1].toFixed(1)+' ';
      }
      return d;
    }
    function len(P){ var L=0; for(var i=0;i<P.length-1;i++){ L+=Math.hypot(P[i+1][0]-P[i][0],P[i+1][1]-P[i][1]); } return L; }
    var defs='', bands='', lines='';
    SERIES.forEach(function(s,k){
      var topP = pts(levels[k+1]), botP = pts(levels[k]).slice().reverse();
      var areaD = 'M'+topP[0][0].toFixed(1)+','+topP[0][1].toFixed(1)+' '+seg(topP)+
        'L'+botP[0][0].toFixed(1)+','+botP[0][1].toFixed(1)+' '+seg(botP)+'Z';

      defs+='<linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'+

      bands+='<path class="dc-area" d="'+areaD+'" fill="url(#'+gid+')"/>';
      var lineD='M'+topP[0][0].toFixed(1)+','+topP[0][1].toFixed(1)+' '+seg(topP);
      lines+='<path class="dc-line" d="'+lineD+'" stroke="'+s.color+'" style="--len:'+Math.ceil(len(topP)+8)+'"/>';
    });
    var grid=''; for(var g=0;g<=3;g++){ var gy=padT+plotH*g/3; grid+='<line class="dc-grid" x1="'+padL+'" y1="'+gy.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+gy.toFixed(1)+'"/>'; }
    var now=new Date(); var axis='';
    for(var i=0;i<N;i++){ var d=new Date(now); d.setDate(now.getDate()-(N-1-i));
      var lbl=(d.getMonth()+1)+'/'+d.getDate();
      axis+='<text class="dc-axis" x="'+X(i).toFixed(1)+'" y="'+(H-7)+'" text-anchor="middle">'+lbl+'</text>'; }
    var legend = SERIES.map(function(s){ return '<span class="lg"><i style="background:'+s.color+'"></i>'+s.name+'</span>'; }).join('');

    // metrics
    function trendIcon(dir, base, stroke){
      var arrow = dir==='up'
        ? '<path d="M9.5 12.6 14 8.2l4.5 4.4M14 8.2V19.8" stroke="'+stroke+'" stroke-width="2" stroke-linecap="square" fill="none"/>'
        : '<path d="M18.5 15.4 14 19.8l-4.5-4.4M14 19.8V8.2" stroke="'+stroke+'" stroke-width="2" stroke-linecap="square" fill="none"/>';
      return '<svg width="26" height="26" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="14" fill="'+base+'" fill-opacity="0.34"/>'+arrow+'</svg>';
    }
    var IC={
      clock:'<circle cx="10" cy="10" r="7.5"/><path d="M10 5.6V10l3 1.8"/>',
      target:'<circle cx="10" cy="10" r="7.5"/><circle cx="10" cy="10" r="3.2"/>',
      star:'<path d="M10 2.5l2.3 4.9 5.2.6-3.9 3.6 1.1 5.2L10 14.7 5.2 17.4l1.1-5.2-3.9-3.6 5.2-.6z"/>'
    };
    function micon(d){ return '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">'+d+'</svg>'; }
    var GBASE='#1f6f63', GSTR='#69d8c2';
    var METRICS = (lang==='de'
      ? [[IC.clock,'Reaktionszeit','1,4 Std','down'],
         [IC.target,'Booking Conversion','32 %','up'],

         [IC.target,'Booking conversion','32%','up'],

    var metrics = METRICS.map(function(m){
      return '<div class="dash-metric">'+

          '<h2>'+(lang==='de'?'Ein Dashboard für deinen ganzen Verkauf':'One dashboard for your whole sale')+'</h2>'+

  function mountGalleryCarousel(){

    if(!track || !prev || !next) return;
    function step(){
      var card = track.querySelector('.ghc-card');
      var gap = parseFloat(getComputedStyle(track).columnGap || getComputedStyle(track).gap || '22') || 22;
      return card ? card.offsetWidth + gap : 320;
    }
    function update(){
      var max = track.scrollWidth - track.clientWidth - 2;
      prev.disabled = track.scrollLeft <= 2;
      next.disabled = track.scrollLeft >= max;
    }
    prev.addEventListener('click', function(){ track.scrollBy({left:-step(), behavior:'smooth'}); });
    next.addEventListener('click', function(){ track.scrollBy({left: step(), behavior:'smooth'}); });
    track.addEventListener('scroll', update, {passive:true});
    window.addEventListener('resize', update);
    update();
  }

        function Line(spring){

          this.nodes = [];

        }
        Line.prototype.update = function(){
          var e=this.spring, t=this.nodes[0];
          t.vx += (pos.x - t.x)*e; t.vy += (pos.y - t.y)*e;
          for(var i=0,a=this.nodes.length;i<a;i++){
            t=this.nodes[i];
            if(i>0){ var n=this.nodes[i-1];
              t.vx += (n.x-t.x)*e; t.vy += (n.y-t.y)*e;
              t.vx += n.vx*E.dampening; t.vy += n.vy*E.dampening; }
            t.vx *= this.friction; t.vy *= this.friction;
            t.x += t.vx; t.y += t.vy; e *= E.tension;
          }
        };
        Line.prototype.draw = function(){
          var n=this.nodes[0].x, i=this.nodes[0].y, a, e, t;
          ctx.beginPath(); ctx.moveTo(n,i);

            e=this.nodes[a]; t=this.nodes[a+1];
            n=0.5*(e.x+t.x); i=0.5*(e.y+t.y);
            ctx.quadraticCurveTo(e.x,e.y,n,i);
          }
          e=this.nodes[a]; t=this.nodes[a+1];

    faPanel.querySelector('.fa-send').addEventListener('click', faSubmit);
    faTa.addEventListener('keydown', function(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); faSubmit(); } });
    document.addEventListener('mousedown', function(e){
      if(!faPanel.hidden && !faPanel.contains(e.target) && !faBtn.contains(e.target)) closeFa();
    });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape' && !faPanel.hidden) closeFa(); });
  }

  // ── Paid & SEO — gradient-wave hero ──
  if(id === 'paid-seo'){
    var waveCanvas = document.getElementById('ph2-wave');
    if(waveCanvas && typeof mountGradientWave === 'function'){
      mountGradientWave(waveCanvas, ['#0a0a0b','#16181c','#2a2e35','#474d57','#6d747f','#9aa2ad'], { deform:{ incline:0.45, noiseAmp:320, noiseFlow:5 } });
    }
  }

  // interactive scroll-morph showcase — real yacht frames
  var SHOWCASE_IMAGES = [
    'fleet/up-bow-sunset.webp','fleet/up-deck-lounge.webp','fleet/up-riva-dive.webp','fleet/up-aerial-wake.jpeg',
    'fleet/up-princess-cliff.webp','fleet/up-fairline-cove.jpeg','fleet/up-sloop-canal.jpeg',
    'fleet/show-1.jpg','fleet/yacht-1.jpg','fleet/show-2.jpg','fleet/yacht-2.jpg',
    'fleet/show-3.jpg','fleet/yacht-3.jpg','fleet/show-4.jpg','fleet/yacht-4.jpg',
    'fleet/show-5.jpg','fleet/yacht-5.jpg','fleet/yacht-6.jpg'
  ];

  if(id === 'ai-visuals'){
    // orbiting carousel hero
    var orbit = document.getElementById('aih-orbit');
    var stage = document.getElementById('aih-stage');
    if(orbit && stage){
      var cardEls = Array.prototype.slice.call(orbit.querySelectorAll('.aih-card'));
      var N = cardEls.length;
      var baseAngles = cardEls.map(function(_,i){ return i * (360 / N); });
      var rots = cardEls.map(function(el){ return parseFloat(el.dataset.rot) || 0; });
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
      var tiltX = 0, tiltY = 0;
      function radius(){
        var r = stage.getBoundingClientRect();
        return Math.min(r.width, r.height) * 0.33;
      }
      function place(){
        var R = radius();
        for(var i=0;i<N;i++){
          var a = baseAngles[i] * Math.PI/180;
          var x = Math.cos(a) * R;
          var y = Math.sin(a) * R * 0.62;
          cardEls[i].style.transform =
            'translate(-50%,-50%) translate('+x.toFixed(1)+'px,'+y.toFixed(1)+'px) rotateZ('+rots[i]+'deg)';
        }
        orbit.style.transform = 'rotateX('+tiltY.toFixed(2)+'deg) rotateY('+tiltX.toFixed(2)+'deg)';
      }
      stage.addEventListener('mousemove', function(e){
        var r = stage.getBoundingClientRect();
        tiltX = ((e.clientX - r.left)/r.width - 0.5) * 16;
        tiltY = -((e.clientY - r.top)/r.height - 0.5) * 16;
      });
      stage.addEventListener('mouseleave', function(){ tiltX = 0; tiltY = 0; });
      place();
      if(!reduce){
        (function loop(){
          for(var i=0;i<N;i++){ baseAngles[i] = (baseAngles[i] + 0.18) % 360; }
          place();
          requestAnimationFrame(loop);
        })();
      }
      window.addEventListener('resize', place);
    }
  } else if(id === 'film'){
    // 3D infinite-gallery hero (three.js)
    var fh = document.getElementById('fh-canvas');
    function startFilm(){
      if(fh && typeof mountFilmGallery === 'function'){ mountFilmGallery(fh); }
    }
    if(typeof mountFilmGallery === 'function'){ startFilm(); }
    else { window.addEventListener('film-gallery-ready', startFilm, { once:true }); }
  } else if(id === 'websites'){
    // scroll-reveal 3D container hero
    var wsHeroEl = document.getElementById('ws-hero');
    var wsCard = document.getElementById('ws-card');
    var wsTitle = document.getElementById('ws-title');
    if(wsHeroEl && wsCard && wsTitle){
      var wsTick = false;
      function wsUpdate(){
        wsTick = false;
        var rect = wsHeroEl.getBoundingClientRect();
        var denom = wsHeroEl.offsetHeight - window.innerHeight;
        var p = denom > 0 ? Math.min(1, Math.max(0, (-rect.top) / denom)) : 0;
        var rot = 20 * (1 - p);
        var mobile = window.innerWidth <= 768;
        var scale = mobile ? (0.82 + 0.13 * p) : (1.04 - 0.04 * p);
        wsCard.style.transform = 'rotateX('+rot.toFixed(2)+'deg) scale('+scale.toFixed(3)+')';
        wsTitle.style.transform = 'translateY('+(-100 * p).toFixed(1)+'px)';
      }
      function wsOnScroll(){ if(!wsTick){ wsTick = true; requestAnimationFrame(wsUpdate); } }
      window.addEventListener('scroll', wsOnScroll, { passive:true });
      window.addEventListener('resize', wsUpdate);
      wsUpdate();
    }
  } else {
    var mSec = document.getElementById('morph-section');
    var mStage = document.getElementById('morph-stage');
    if(mSec && mStage && typeof mountScrollMorph === 'function'){
      mountScrollMorph(mSec, mStage, { images: SHOWCASE_IMAGES });
    }
  }

  // ── 3D orbit gallery (silver particle sphere + orbiting portfolio frames) ──
  function orbitGalleryHtml(lang){
    return '<section class="orbit-sec" id="orbit-sec">'+
      '<div class="orbit-stage">'+
        '<div class="orbit-canvas" id="orbit-canvas"></div>'+
        '<div class="orbit-head">'+
          '<div class="ok">'+(lang==='de'?'// ARCHIV IM UMLAUF':'// ARCHIVE IN ORBIT')+'</div>'+
          '<h2>'+(lang==='de'?'Das Portfolio,<br>in Bewegung':'The portfolio,<br>in orbit')+'</h2>'+
          '<p>'+(lang==='de'?'Eine Auswahl unserer Aufnahmen — Exterieur, Deck und Detail. Ziehen zum Drehen.':'A selection of our frames — exterior, deck and detail. Drag to spin.')+'</p>'+
        '</div>'+
        '<div class="orbit-hint"><span>'+(lang==='de'?'Ziehen · Drehen':'Drag · Rotate')+'</span><span class="dot"></span><span>'+(lang==='de'?'Scrollen · Zoom':'Scroll · Zoom')+'</span></div>'+
      '</div>'+
    '</section>';
  }

  function mountOrbitGallery(){
    var host = document.getElementById('orbit-canvas');
    if(!host) return;
    if(typeof THREE === 'undefined'){
      // three.js nur bei Bedarf nachladen (spart ~600 KB auf allen anderen Modulseiten)
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/three@0.158.0/build/three.min.js';
      s.onload = function(){ mountOrbitGallery(); };
      document.head.appendChild(s);
      return;
    }
    var IMAGES = ['fleet/up-bow-sunset.webp','fleet/up-deck-lounge.webp','fleet/up-riva-dive.webp',
      'fleet/up-aerial-wake.jpeg','fleet/up-princess-cliff.webp','fleet/up-fairline-cove.jpeg','fleet/up-sloop-canal.jpeg'];
    var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

    function discTex(){
      var c=document.createElement('canvas'); c.width=c.height=64; var g=c.getContext('2d');
      var rg=g.createRadialGradient(32,32,0,32,32,32);
      rg.addColorStop(0,'rgba(255,255,255,1)'); rg.addColorStop(0.42,'rgba(255,255,255,0.82)'); rg.addColorStop(1,'rgba(255,255,255,0)');
      g.fillStyle=rg; g.fillRect(0,0,64,64);
      var t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
    }

    var W = host.clientWidth || window.innerWidth, H = host.clientHeight || 640;
    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 100);
    var baseDir = new THREE.Vector3(-10,1.5,10).normalize();
    var dist = 13.3;
    var renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
    renderer.setSize(W,H);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    host.appendChild(renderer.domElement);

    var group = new THREE.Group(); scene.add(group);

    // silver particle sphere
    var COUNT=1500, R=9, RND=4;
    var positions=new Float32Array(COUNT*3), colors=new Float32Array(COUNT*3), col=new THREE.Color();
    for(var i=0;i<COUNT;i++){
      var phi=Math.acos(-1+(2*i)/COUNT), theta=Math.sqrt(COUNT*Math.PI)*phi, rr=R+(Math.random()-0.5)*RND;
      positions[i*3]=rr*Math.cos(theta)*Math.sin(phi);
      positions[i*3+1]=rr*Math.cos(phi);
      positions[i*3+2]=rr*Math.sin(theta)*Math.sin(phi);
      col.setHSL(0.60,0.04,0.62+Math.random()*0.34);
      colors[i*3]=col.r; colors[i*3+1]=col.g; colors[i*3+2]=col.b;
    }
    var pg=new THREE.BufferGeometry();
    pg.setAttribute('position',new THREE.BufferAttribute(positions,3));
    pg.setAttribute('color',new THREE.BufferAttribute(colors,3));
    var pm=new THREE.PointsMaterial({size:0.13,map:discTex(),vertexColors:true,transparent:true,depthWrite:false,sizeAttenuation:true,blending:THREE.AdditiveBlending,opacity:0.92});
    group.add(new THREE.Points(pg,pm));

    // orbiting portfolio frames
    var loader=new THREE.TextureLoader(), N=IMAGES.length, IMG=2.5, FR=5.2;
    for(var j=0;j<N;j++){ (function(j){
      var angle=(j/N)*Math.PI*2, x=FR*Math.cos(angle), z=FR*Math.sin(angle);
      var mat=new THREE.MeshBasicMaterial({color:0x0e0e0e,side:THREE.DoubleSide,transparent:true});
      var mesh=new THREE.Mesh(new THREE.PlaneGeometry(IMG,IMG),mat);
      mesh.position.set(x,0,z); mesh.rotation.y=Math.PI/2-angle; group.add(mesh);
      loader.load(IMAGES[j], function(tex){
        tex.colorSpace=THREE.SRGBColorSpace;
        var iw=(tex.image&&tex.image.width)||1, ih=(tex.image&&tex.image.height)||1, a=iw/ih;
        if(a>=1) mesh.scale.set(a,1,1); else mesh.scale.set(1,1/a,1);
        mat.map=tex; mat.color.set(0xffffff); mat.needsUpdate=true;
      });
    })(j); }

    // interaction
    var targetY=0,targetX=0,curY=0,curX=0,auto=reduce?0:0.0018,dragging=false,lx=0,ly=0;
    host.addEventListener('pointerdown',function(e){dragging=true;lx=e.clientX;ly=e.clientY;try{host.setPointerCapture(e.pointerId);}catch(_){}}); 
    host.addEventListener('pointermove',function(e){ if(!dragging)return; var dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY; targetY+=dx*0.006; targetX+=dy*0.006; targetX=Math.max(-0.75,Math.min(0.75,targetX)); });
    function up(){dragging=false;}
    host.addEventListener('pointerup',up); host.addEventListener('pointercancel',up); window.addEventListener('pointerup',up);
    host.addEventListener('wheel',function(e){ e.preventDefault(); dist+=e.deltaY*0.012; dist=Math.max(8.5,Math.min(20,dist)); },{passive:false});

    function onResize(){ W=host.clientWidth||window.innerWidth; H=host.clientHeight||640; camera.aspect=W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H); }
    window.addEventListener('resize', onResize);

    var running=false;
    function loop(){ if(!running)return; requestAnimationFrame(loop);
      if(!dragging) targetY+=auto;
      curY+=(targetY-curY)*0.08; curX+=(targetX-curX)*0.08;
      group.rotation.y=curY; group.rotation.x=curX;
      camera.position.copy(baseDir).multiplyScalar(dist); camera.lookAt(0,0,0);
      renderer.render(scene,camera);
    }
    var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ if(!running){running=true; onResize(); loop();} } else { running=false; } }); },{threshold:0.04});
    io.observe(document.getElementById('orbit-sec'));
  }
})();
</script>
