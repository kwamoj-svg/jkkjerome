<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Info Center · JKK Jerome | Häufige Fragen &amp; Ablauf</title>
<meta name="description" content="Alles, was du vor einer Zusammenarbeit wissen musst: Ablauf, Preise, Module und häufige Fragen zur Digitalisierung der Bootsbranche." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --bg:#000;--fg:#fff;--fg-2:#b8b8b8;--fg-3:#6a6a6a;--line:#1c1c1c;--line-bright:#3a3a3a;
    --gold:oklch(0.82 0.095 82);--gold-2:oklch(0.74 0.105 75);--gold-dim:oklch(0.45 0.06 70);
    --mono:"IBM Plex Mono",ui-monospace,Menlo,monospace;
    --sans:"IBM Plex Sans",system-ui,-apple-system,sans-serif;
    --display:"Archivo",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow:hidden}
  .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45;
    background-image:linear-gradient(to right,var(--line) 1px,transparent 1px),linear-gradient(to bottom,var(--line) 1px,transparent 1px);
    background-size:72px 72px;
    -webkit-mask-image:radial-gradient(120% 100% at 50% 50%,#000 25%,transparent 80%);
    mask-image:radial-gradient(120% 100% at 50% 50%,#000 25%,transparent 80%);}

  .bar{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
    padding:24px 32px;font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg-3)}
  .bar a{color:var(--fg-2);text-decoration:none;display:inline-flex;align-items:center;gap:9px;transition:color .25s}
  .bar a:hover{color:#fff}
  .bar .mk{color:#fff;font-family:var(--display);font-weight:900;letter-spacing:.04em}
  .bar .title{color:var(--gold)}

  .stage{position:relative;z-index:1;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .hint{position:fixed;bottom:26px;left:0;right:0;z-index:20;text-align:center;
    font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--fg-3)}

  .orbit-wrap{position:relative;width:100%;max-width:880px;height:100%;display:flex;align-items:center;justify-content:center}
  .orbit{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}

  /* centre core */
  .core{position:absolute;width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10;
    background:radial-gradient(circle at 35% 30%, var(--gold-2), var(--gold-dim));
    box-shadow:0 0 60px -8px var(--gold);}
  .core .ring{position:absolute;border-radius:50%;border:1px solid rgba(214,180,120,.45)}
  .core .r1{width:88px;height:88px;animation:ping 2.6s cubic-bezier(0,0,.2,1) infinite}
  .core .r2{width:112px;height:112px;opacity:.6;animation:ping 2.6s cubic-bezier(0,0,.2,1) infinite;animation-delay:.6s}
  .core .dot{width:30px;height:30px;border-radius:50%;background:#0a0a0a;display:flex;align-items:center;justify-content:center}
  .core .dot svg{width:15px;height:15px;color:var(--gold)}
  @keyframes ping{75%,100%{transform:scale(1.9);opacity:0}}

  .orbit-ring{position:absolute;width:400px;height:400px;border-radius:50%;border:1px solid rgba(255,255,255,.09)}
  .orbit-ring.r2{width:400px;height:400px}

  .node{position:absolute;cursor:pointer;transition:opacity .5s ease}
  .node .halo{position:absolute;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;
    background:radial-gradient(circle, rgba(214,180,120,.22) 0%, transparent 70%)}
  .node .pip{position:relative;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:#0a0a0a;border:1.5px solid var(--gold-dim);color:var(--gold);transition:all .3s ease}
  .node .pip svg{width:18px;height:18px}
  .node.related .pip{background:rgba(214,180,120,.18);border-color:var(--gold);color:#fff}
  .node.active .pip{background:var(--gold);border-color:#fff;color:#0a0a0a;transform:scale(1.4);box-shadow:0 0 28px -4px var(--gold)}
  .node .lbl{position:absolute;top:54px;left:50%;transform:translateX(-50%);white-space:nowrap;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-2);transition:all .3s}
  .node.active .lbl{color:#fff}

  /* expanded card */
  .pop{position:absolute;top:84px;left:50%;transform:translateX(-50%);width:280px;z-index:40;
    background:rgba(8,8,8,.94);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    border:1px solid rgba(214,180,120,.3);box-shadow:0 30px 80px -30px rgba(0,0,0,.9);
    padding:18px;animation:popIn .35s cubic-bezier(.2,.7,.2,1)}
  @keyframes popIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  .pop .stem{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:1px;height:14px;background:rgba(214,180,120,.5)}
  .pop .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .pop .tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--gold-dim);color:var(--gold)}
  .pop .meta{font-family:var(--mono);font-size:10px;color:var(--fg-3)}
  .pop h3{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:-.01em;text-transform:uppercase;margin-bottom:8px}
  .pop p{font-size:13px;line-height:1.62;color:var(--fg-2)}
  .pop .rel{margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  .pop .rel .rl{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .pop .rel .chips{display:flex;flex-wrap:wrap;gap:6px}
  .pop .rel button{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--fg-2);background:transparent;border:1px solid var(--line-bright);
    padding:4px 8px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .25s;text-transform:uppercase}
  .pop .rel button:hover{border-color:var(--gold);color:#fff}

  .head-block{position:fixed;top:84px;left:0;right:0;z-index:20;text-align:center;pointer-events:none}
  .head-block .k{font-family:var(--mono);font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
  .head-block h1{font-family:var(--display);font-weight:900;text-transform:uppercase;letter-spacing:-.02em;font-size:clamp(26px,3.6vw,44px)}
  @media(max-width:640px){
    .orbit-ring{width:300px;height:300px}
    .head-block h1{font-size:24px}
  }
</style>
<link rel="icon" href="favicon.ico" sizes="32x32" />
<link rel="icon" href="favicon.png" type="image/png" sizes="512x512" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>
<div class="grid-bg"></div>
<div class="bar">
  <a href="index.html#top"><span style="font-family:var(--display);font-weight:900">←</span> <span class="mk">Jerome Kwamo</span></a>
  <span class="title" id="bar-title">INFO CENTER</span>
</div>
<div class="head-block">
  <div class="k" id="eyebrow">WISSEN · ORBIT</div>
  <h1 id="title">Info Center</h1>
</div>
<div id="root"></div>
<div class="hint" id="hint">Knoten anklicken für eine kurze Erklärung</div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ── tiny lucide-style icons ── */
const I = ({d, size=18}) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">{d}</svg>);
const IcoCamera = (p)=><I {...p} d={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z"/><circle cx="12" cy="13" r="3.2"/></>}/>;
const IcoCpu    = (p)=><I {...p} d={<><rect x="6" y="6" width="12" height="12" rx="1.5"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M1 9h3M1 15h3M20 9h3M20 15h3"/></>}/>;
const IcoSearch = (p)=><I {...p} d={<><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></>}/>;
const IcoFlow   = (p)=><I {...p} d={<><circle cx="6" cy="6" r="2.4"/><circle cx="18" cy="6" r="2.4"/><circle cx="12" cy="18" r="2.4"/><path d="M8.4 6H18M6 8.4V14a3 3 0 0 0 3 3h1M16 8l-3.4 7.5"/></>}/>;
const IcoGlobe  = (p)=><I {...p} d={<><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18"/></>}/>;
const IcoChart  = (p)=><I {...p} d={<><path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/></>}/>;
const IcoArrow  = (p)=><I {...p} size={9} d={<path d="M5 12h14M12 5l7 7-7 7"/>}/>;
const IcoLink   = (p)=><I {...p} size={10} d={<><path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"/></>}/>;

let LANG = 'de';
try { LANG = (localStorage.getItem('jkk_lang') === 'en') ? 'en' : (localStorage.getItem('jkk_lang') && localStorage.getItem('jkk_lang')!=='de' ? 'en' : 'de'); } catch(e){}

const DATA = [
  { id:1, icon:IcoCamera, cat:"VISUALS",
    de:{t:"Cinematic Visuals", x:"Professionelle Film und Fotoaufnahmen, Drohnenbilder und smarte Bildbearbeitung — Bilder, die den Käufer überzeugen."},
    en:{t:"Cinematic Visuals", x:"Professional film & photo, drone footage and smart image editing — imagery that convinces the buyer."},
    rel:[2,3] },
  { id:2, icon:IcoCpu, cat:"AI",
    de:{t:"KI-Sales-System", x:"Rund um die Uhr Anfragen beantworten, bewerten und nachfassen — dein digitaler Assistent, der nie schläft."},
    en:{t:"AI Sales Engine", x:"24/7 chatbot, enquiry assessment and automated follow-ups — your digital assistant that never sleeps."},
    rel:[1,4] },
  { id:3, icon:IcoSearch, cat:"AUDIT",
    de:{t:"Onlineauftritt Analyse", x:"KI Analyse deiner aktuellen Onlinepräsenz: Bilder, Texte, Abläufe und Optimierungspotenzial. Ergebnis in 72 Stunden."},
    en:{t:"Online Presence Audit", x:"AI analysis of your current online presence: imagery, copy, workflows and optimisation potential. Report in 72 hours."},
    rel:[1,4] },
  { id:4, icon:IcoFlow, cat:"SYSTEM",
    de:{t:"Verkaufssystem", x:"Von der Anfrage zur Buchung — automatisch. Verkaufsprozess, Systemanbindung und sauberes Tracking."},
    en:{t:"Sales System", x:"From enquiry to booking — automated. Sales process, system integration and clean tracking."},
    rel:[2,6] },
  { id:5, icon:IcoGlobe, cat:"REACH",
    de:{t:"Worldwide", x:"Basis in Bielefeld, im Einsatz weltweit. Ein Ansprechpartner für alles."},
    en:{t:"Worldwide", x:"Based in Bielefeld, working worldwide. One contact for everything."},
    rel:[1] },
  { id:6, icon:IcoChart, cat:"RESULT",
    de:{t:"Messbare Wirkung", x:"Sichtbarkeit im Schnitt +312 %, Umsatz ×2,4 — transparent im Dashboard, Woche für Woche."},
    en:{t:"Measurable Impact", x:"Visibility +312% on average, revenue ×2.4 — transparent in your dashboard, week by week."},
    rel:[4] },
];

function Orbital({data}){
  const [angle, setAngle] = useState(0);
  const [auto, setAuto] = useState(true);
  const [active, setActive] = useState(null);
  const wrapRef = useRef(null), orbitRef = useRef(null);

  useEffect(()=>{
    if(!auto) return;
    const t = setInterval(()=> setAngle(a => +( (a+0.28)%360 ).toFixed(3)), 50);
    return ()=> clearInterval(t);
  }, [auto]);

  const pos = (i,total)=>{
    const a = ((i/total)*360 + angle) % 360;
    const rad = a*Math.PI/180, R = 200;
    return { x:R*Math.cos(rad), y:R*Math.sin(rad),
      z: Math.round(100+50*Math.cos(rad)),
      o: Math.max(0.45, Math.min(1, 0.45+0.55*((1+Math.sin(rad))/2))) };
  };
  const relOf = id => (data.find(d=>d.id===id)||{}).rel||[];
  const isRel = id => active && relOf(active).includes(id);

  const toggle = (id)=>{
    if(active===id){ setActive(null); setAuto(true); }
    else {
      setActive(id); setAuto(false);
      const idx = data.findIndex(d=>d.id===id);
      setAngle(270 - (idx/data.length)*360);
    }
  };
  const bgClick = (e)=>{ if(e.target===wrapRef.current||e.target===orbitRef.current){ setActive(null); setAuto(true); } };

  return (
    <div className="stage" ref={wrapRef} onClick={bgClick}>
      <div className="orbit-wrap" ref={orbitRef} onClick={bgClick}>
        <div className="orbit">
          <div className="core">
            <div className="ring r1"></div>
            <div className="ring r2"></div>
            <div className="dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="5" r="2.2"/><line x1="12" y1="7.2" x2="12" y2="21"/><line x1="6.5" y1="12" x2="17.5" y2="12"/><path d="M4.5 14a7.5 7.5 0 0 0 15 0"/></svg></div>
          </div>
          <div className="orbit-ring"></div>

          {data.map((item,idx)=>{
            const p = pos(idx, data.length);
            const expanded = active===item.id;
            const related = isRel(item.id);
            const Icon = item.icon;
            const L = item[LANG];
            const style = { transform:`translate(${p.x}px, ${p.y}px)`, zIndex: expanded?200:p.z, opacity: expanded?1:p.o };
            const halo = item.cat==='RESULT'?70:60;
            return (
              <div key={item.id} className={"node"+(expanded?" active":"")+(related?" related":"")}
                   style={style} onClick={(e)=>{ e.stopPropagation(); toggle(item.id); }}>
                <div className="halo" style={{width:halo, height:halo}}></div>
                <div className="pip"><Icon/></div>
                <div className="lbl">{L.t}</div>
                {expanded && (
                  <div className="pop" onClick={e=>e.stopPropagation()}>
                    <div className="stem"></div>
                    <div className="head">
                      <span className="tag">{item.cat}</span>
                      <span className="meta">{String(idx+1).padStart(2,'0')} / {String(data.length).padStart(2,'0')}</span>
                    </div>
                    <h3>{L.t}</h3>
                    <p>{L.x}</p>
                    {item.rel.length>0 && (
                      <div className="rel">
                        <div className="rl"><IcoLink/> {LANG==='de'?'Verknüpft':'Connected'}</div>
                        <div className="chips">
                          {item.rel.map(rid=>{
                            const r = data.find(d=>d.id===rid);
                            return (<button key={rid} onClick={(e)=>{ e.stopPropagation(); toggle(rid); }}>{r[LANG].t}<IcoArrow/></button>);
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// localized chrome
if(LANG==='en'){
  document.getElementById('eyebrow').textContent='KNOWLEDGE · ORBIT';
  document.getElementById('title').textContent='Info Center';
  document.getElementById('hint').textContent='Tap a node for a quick explainer';
  document.documentElement.lang='en';
}

ReactDOM.createRoot(document.getElementById('root')).render(<Orbital data={DATA} />);
</script>

<script src="consent-tracking.js"></script>
<script src="admin/tracker.js"></script>
</body>
</html>
